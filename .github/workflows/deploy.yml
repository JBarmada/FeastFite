name: Build & Deploy to GKE

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-central1
  GAR_REPO: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/feastfite

jobs:
  # ── Job 1: Build all Docker images in parallel ──────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: auth-service
            dockerfile: services/auth-service/Dockerfile
          - service: territory-service
            dockerfile: services/territory-service/Dockerfile
          - service: vote-service
            dockerfile: services/vote-service/Dockerfile
          - service: economy-service
            dockerfile: services/economy-service/Dockerfile
          - service: profile-service
            dockerfile: services/profile-service/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
          - service: kong
            dockerfile: services/api-gateway/Dockerfile

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity — no static keys)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE=${{ env.GAR_REPO }}/${{ matrix.service }}
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ── Job 2: Deploy to GKE (runs after all builds succeed) ────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ env.GCP_REGION }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/infra/
          kubectl apply -f k8s/auth/
          kubectl apply -f k8s/territory/
          kubectl apply -f k8s/vote/
          kubectl apply -f k8s/economy/
          kubectl apply -f k8s/profile/
          kubectl apply -f k8s/gateway/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress.yml

      - name: Update image tags to git SHA
        env:
          SHA: ${{ github.sha }}
          REPO: ${{ env.GAR_REPO }}
        run: |
          kubectl set image deployment/auth-service      auth-service=$REPO/auth-service:$SHA      -n feastfite
          kubectl set image deployment/territory-service territory-service=$REPO/territory-service:$SHA -n feastfite
          kubectl set image deployment/vote-service      vote-service=$REPO/vote-service:$SHA      -n feastfite
          kubectl set image deployment/economy-service   economy-service=$REPO/economy-service:$SHA   -n feastfite
          kubectl set image deployment/profile-service   profile-service=$REPO/profile-service:$SHA   -n feastfite
          kubectl set image deployment/kong              kong=$REPO/kong:$SHA                      -n feastfite
          kubectl set image deployment/frontend          frontend=$REPO/frontend:$SHA              -n feastfite

      - name: Force RabbitMQ onto latest StatefulSet revision
        run: |
          kubectl rollout restart statefulset/rabbitmq -n feastfite

          current_revision="$(kubectl get statefulset rabbitmq -n feastfite -o jsonpath='{.status.currentRevision}')"
          update_revision="$(kubectl get statefulset rabbitmq -n feastfite -o jsonpath='{.status.updateRevision}')"
          pod_revision="$(kubectl get pod rabbitmq-0 -n feastfite -o jsonpath='{.metadata.labels.controller-revision-hash}' 2>/dev/null || true)"

          echo "RabbitMQ StatefulSet current revision: $current_revision"
          echo "RabbitMQ StatefulSet update revision:  $update_revision"
          echo "RabbitMQ pod revision:                $pod_revision"

          if [ "$pod_revision" != "$update_revision" ]; then
            echo "Deleting stale rabbitmq-0 pod so the StatefulSet can recreate it from the latest template..."
            kubectl delete pod rabbitmq-0 -n feastfite --wait=false
          fi

      - name: Wait for rollouts to complete
        run: |
          failed=0
          for sts in rabbitmq; do
            echo "Waiting for statefulset/$sts..."
            if ! kubectl rollout status statefulset/$sts -n feastfite --timeout=600s; then
              failed=1
            fi
          done

          for dep in auth-service territory-service vote-service economy-service profile-service kong frontend; do
            echo "Waiting for $dep..."
            if ! kubectl rollout status deployment/$dep -n feastfite --timeout=600s; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Print pod status
        run: kubectl get pods -n feastfite

      - name: Diagnostics on rollout failure
        if: failure()
        run: |
          kubectl get pods -n feastfite -o wide
          kubectl get endpoints rabbitmq -n feastfite || true
          kubectl describe statefulset/rabbitmq -n feastfite || true
          kubectl describe pod -l app=rabbitmq -n feastfite || true
          kubectl logs statefulset/rabbitmq -n feastfite --tail=200 || true

          for dep in auth-service territory-service vote-service economy-service profile-service kong frontend; do
            echo "=== deployment/$dep ==="
            kubectl describe deployment/$dep -n feastfite || true
            kubectl describe pod -l app=$dep -n feastfite || true
            kubectl logs deployment/$dep -n feastfite --tail=200 || true
          done

      - name: Print ingress IP
        run: kubectl get ingress -n feastfite
