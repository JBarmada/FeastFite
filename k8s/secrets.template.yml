# ─────────────────────────────────────────────────────────────────────────────
# SECRETS TEMPLATE — DO NOT COMMIT REAL VALUES
# Run the kubectl commands below to create secrets in your cluster.
# k8s/secrets.yml is gitignored; this template is safe to commit.
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. Postgres credentials (used by all 5 services) ─────────────────────────
#
# kubectl create secret generic postgres-credentials \
#   --from-literal=username=feastfite \
#   --from-literal=password=REPLACE_WITH_STRONG_PASSWORD \
#   -n feastfite

# ── 2. JWT signing secret ─────────────────────────────────────────────────────
#
# kubectl create secret generic jwt-secret \
#   --from-literal=secret=$(openssl rand -base64 32) \
#   -n feastfite

# ── 3. RabbitMQ credentials ───────────────────────────────────────────────────
#
# kubectl create secret generic rabbitmq-credentials \
#   --from-literal=username=feastfite \
#   --from-literal=password=REPLACE_WITH_STRONG_PASSWORD \
#   -n feastfite

# ── 4. MinIO credentials ──────────────────────────────────────────────────────
#
# kubectl create secret generic minio-credentials \
#   --from-literal=access-key=feastfite \
#   --from-literal=secret-key=REPLACE_WITH_STRONG_PASSWORD \
#   -n feastfite

# ── All-at-once convenience (edit values first!) ──────────────────────────────
#
# PG_PASS=your_pg_password
# RMQ_PASS=your_rmq_password
# MINIO_PASS=your_minio_password
# JWT=$(openssl rand -base64 32)
#
# kubectl create secret generic postgres-credentials  --from-literal=username=feastfite --from-literal=password=$PG_PASS    -n feastfite
# kubectl create secret generic jwt-secret            --from-literal=secret=$JWT                                             -n feastfite
# kubectl create secret generic rabbitmq-credentials  --from-literal=username=feastfite --from-literal=password=$RMQ_PASS   -n feastfite
# kubectl create secret generic minio-credentials     --from-literal=access-key=feastfite --from-literal=secret-key=$MINIO_PASS -n feastfite
