apiVersion: apps/v1
kind: Deployment
metadata:
  name: territory-service
  namespace: feastfite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: territory-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: territory-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: territory-service
          image: us-central1-docker.pkg.dev/GCP_PROJECT_ID/feastfite/territory-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: feastfite-config
                  key: NODE_ENV
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: DB_HOST
              value: postgres-territory
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: territory_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
            - name: RABBITMQ_URL
              value: amqp://$(RABBITMQ_USERNAME):$(RABBITMQ_PASSWORD)@rabbitmq:5672
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: feastfite-config
                  key: RABBITMQ_EXCHANGE
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: territory-service
  namespace: feastfite
spec:
  selector:
    app: territory-service
  ports:
    - name: http
      port: 3002
      targetPort: 3002
